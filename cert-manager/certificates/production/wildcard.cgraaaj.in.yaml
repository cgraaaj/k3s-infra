---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-cgraaaj-in
  namespace: cert-manager
spec:
  secretName: wildcard-cgraaaj-in-tls
  secretTemplate:
    annotations:
      replicator.v1/replicate-to: "argocd,argocd-qa,authentik,coder,hashicorpvault,mediaradar,monitoring,stockx,traefik"
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: "*.cgraaaj.in"
  dnsNames:
    - "*.cgraaaj.in"
    - "cgraaaj.in"
    - "*.qa.cgraaaj.in"
    - "*.stg.cgraaaj.in"
