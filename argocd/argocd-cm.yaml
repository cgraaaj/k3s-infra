apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd-qa
  annotations:
    reloader.stakater.com/match: "true"
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # -----------------------------------------------------------------------
  # Cluster-wide ignoreDifferences rules.
  #
  # Why these exist
  # ---------------
  # When ArgoCD adopts resources that were installed out-of-band (manual
  # `kubectl apply`, `helm install`, or an operator) the live objects
  # contain every default that the Kubernetes API server injects, while
  # the rendered Helm/Kustomize manifests in Git only contain what the
  # author typed. ArgoCD then marks these resources as OutOfSync forever.
  #
  # Rather than adding a 20-line `ignoreDifferences` block to every single
  # Application manifest, we ignore the known-benign defaults here, once,
  # for the whole cluster. Real, actionable drift still surfaces.
  # -----------------------------------------------------------------------
  resource.customizations.ignoreDifferences.apps_Deployment: |
    jqPathExpressions:
      - .spec.progressDeadlineSeconds
      - .spec.revisionHistoryLimit
      - .spec.strategy.type
      - .spec.template.metadata.creationTimestamp
      - .spec.template.spec.dnsPolicy
      - .spec.template.spec.restartPolicy
      - .spec.template.spec.schedulerName
      - .spec.template.spec.securityContext
      - .spec.template.spec.terminationGracePeriodSeconds
      - .spec.template.spec.containers[]?.terminationMessagePath
      - .spec.template.spec.containers[]?.terminationMessagePolicy
      - .spec.template.spec.containers[]?.readinessProbe.failureThreshold
      - .spec.template.spec.containers[]?.readinessProbe.successThreshold
      - .spec.template.spec.containers[]?.readinessProbe.httpGet.scheme
      - .spec.template.spec.containers[]?.livenessProbe.failureThreshold
      - .spec.template.spec.containers[]?.livenessProbe.successThreshold
      - .spec.template.spec.containers[]?.livenessProbe.httpGet.scheme
      - .spec.template.spec.containers[]?.startupProbe.failureThreshold
      - .spec.template.spec.containers[]?.startupProbe.successThreshold
      - .spec.template.spec.containers[]?.env[]?.valueFrom.resourceFieldRef.divisor
      - .spec.template.spec.volumes[]?.projected.defaultMode
      - .spec.template.spec.volumes[]?.secret.defaultMode
      - .spec.template.spec.volumes[]?.configMap.defaultMode

  resource.customizations.ignoreDifferences.apps_StatefulSet: |
    jqPathExpressions:
      - .spec.revisionHistoryLimit
      - .spec.podManagementPolicy
      - .spec.template.metadata.creationTimestamp
      - .spec.template.spec.dnsPolicy
      - .spec.template.spec.restartPolicy
      - .spec.template.spec.schedulerName
      - .spec.template.spec.terminationGracePeriodSeconds
      - .spec.template.spec.containers[]?.terminationMessagePath
      - .spec.template.spec.containers[]?.terminationMessagePolicy

  resource.customizations.ignoreDifferences.apps_DaemonSet: |
    jqPathExpressions:
      - .spec.revisionHistoryLimit
      - .spec.template.metadata.creationTimestamp
      - .spec.template.spec.dnsPolicy
      - .spec.template.spec.restartPolicy
      - .spec.template.spec.schedulerName
      - .spec.template.spec.terminationGracePeriodSeconds
      - .spec.template.spec.containers[]?.terminationMessagePath
      - .spec.template.spec.containers[]?.terminationMessagePolicy

  # CustomResourceDefinitions: cert-manager (and cert-manager-like
  # webhook-ca-injectors) patch the caBundle field on CRD conversion
  # webhooks at runtime. That's by design — it's how the CA chain
  # rotates without a re-install. Never treat it as drift.
  resource.customizations.ignoreDifferences.apiextensions.k8s.io_CustomResourceDefinition: |
    jqPathExpressions:
      - .spec.conversion.webhook.clientConfig.caBundle
      - .metadata.annotations."cert-manager.io/inject-ca-from"
      - .metadata.annotations."cert-manager.io/inject-ca-from-secret"
      - .status

  # Validating / Mutating webhooks also get caBundle rotation, and K8s
  # sometimes flips .failurePolicy between Fail and Ignore depending on
  # whether the webhook pod is up. Neither is an actionable diff.
  resource.customizations.ignoreDifferences.admissionregistration.k8s.io_ValidatingWebhookConfiguration: |
    jqPathExpressions:
      - .webhooks[]?.clientConfig.caBundle
      - .webhooks[]?.failurePolicy

  resource.customizations.ignoreDifferences.admissionregistration.k8s.io_MutatingWebhookConfiguration: |
    jqPathExpressions:
      - .webhooks[]?.clientConfig.caBundle
      - .webhooks[]?.failurePolicy

  # Services get .spec.clusterIP / .spec.clusterIPs assigned by the API
  # server at create time; they're immutable after that so diff noise
  # here is purely cosmetic.
  resource.customizations.ignoreDifferences.Service: |
    jqPathExpressions:
      - .spec.clusterIP
      - .spec.clusterIPs
      - .spec.ipFamilies
      - .spec.ipFamilyPolicy
      - .spec.internalTrafficPolicy
      - .spec.ports[]?.nodePort

  # Normalise CPU quantity drift ("1000m" vs "1") for every resource that
  # exposes a PodSpec. ArgoCD's built-in known-type normalisers handle
  # core types when this key lists them explicitly.
  resource.compareoptions: |
    ignoreAggregatedRoles: true
    ignoreResourceStatusField: all
