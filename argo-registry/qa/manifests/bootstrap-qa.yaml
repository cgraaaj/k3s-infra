apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-qa
  namespace: argocd-qa
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/cgraaaj/k3s-infra.git
    targetRevision: master
    path: argo-registry/qa/manifests
    directory:
      recurse: true
      include: '*.yaml'
      exclude: '{bootstrap-qa.yaml,apps/test.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd-qa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
