apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd-qa
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  sources:
    - repoURL: https://charts.goauthentik.io
      chart: authentik
      targetRevision: 2025.12.4
      helm:
        valueFiles:
          - $values/authentik/values.yaml
        # Inline overrides to land postgres on longhorn-retain instead of local-path.
        # Done here (not in cgraaaj/k3s-infra values.yaml) so the migration is contained
        # to a single repo PR. In chart 2025.12.4 the postgres section was restructured
        # to bitnami subchart layout, so the keys are postgresql.primary.persistence.*
        # (NOT postgresql.storageClass / postgresql.persistence.storageClass).
        parameters:
          - name: postgresql.primary.persistence.enabled
            value: "true"
          - name: postgresql.primary.persistence.storageClass
            value: longhorn-retain
          - name: postgresql.primary.persistence.size
            value: 8Gi
    - repoURL: https://github.com/cgraaaj/k3s-infra.git
      targetRevision: master
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
