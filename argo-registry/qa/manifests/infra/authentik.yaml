apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd-qa
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  sources:
    - repoURL: https://charts.goauthentik.io
      chart: authentik
      targetRevision: 2025.2.4
      helm:
        valueFiles:
          - $values/authentik/values.yaml
    - repoURL: https://github.com/cgraaaj/k3s-infra.git
      targetRevision: master
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    # IMPORTANT: the `automated` block is intentionally OMITTED.
    #
    # Even with `prune: false` and `selfHeal: false`, the mere presence of an
    # `automated` block enables ArgoCD auto-sync, which would re-apply the git-pinned
    # chart `2025.2.4` over the live runtime that has been hand-patched to image
    # `2025.12.4`. The hand patch is required because the prior 2025.12.4 run already
    # migrated the DB schema (renamed `authentik_core_authenticatedsession.session_key`
    # -> `session_id`); the rolled-back 2025.2.4 server crash-loops with
    # `column ... session_key does not exist`. Only manual sync is safe here until the
    # PG15 -> PG17 migration AND chart roll-forward to 2025.12.4 are properly executed.
    # See `infra/UPGRADE-ROADMAP.md` ("authentik PG15 -> 17") for the runbook.
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
