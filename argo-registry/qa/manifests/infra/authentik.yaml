apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd-qa
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  sources:
    - repoURL: https://charts.goauthentik.io
      chart: authentik
      targetRevision: 2025.12.4
      helm:
        valueFiles:
          - $values/authentik/values.yaml
        # Inline overrides to land postgres on longhorn-retain instead of local-path.
        # Done here (not in cgraaaj/k3s-infra values.yaml) so the migration is contained
        # to a single repo PR. In chart 2025.12.4 the postgres section was restructured
        # to bitnami subchart layout, so the keys are postgresql.primary.persistence.*
        # (NOT postgresql.storageClass / postgresql.persistence.storageClass).
        parameters:
          - name: postgresql.primary.persistence.enabled
            value: "true"
          - name: postgresql.primary.persistence.storageClass
            value: longhorn-retain
          - name: postgresql.primary.persistence.size
            value: 8Gi
    - repoURL: https://github.com/cgraaaj/k3s-infra.git
      targetRevision: master
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    # IMPORTANT: the `automated` block is intentionally OMITTED for the duration of the
    # PG15 -> PG17 + local-path -> longhorn-retain migration (Path B runbook).
    #
    # Re-enabling auto-sync is the FINAL step of Phase 7 of the migration; it must NOT
    # happen until the new PG17 pod is up on longhorn-retain, the SQL dump is restored,
    # and the authentik server + worker are verified Ready.
    # See `infra/UPGRADE-ROADMAP.md` ("authentik PG15 -> 17") for the runbook.
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
