apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd-qa
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  sources:
    - repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: v1.20.2
      helm:
        # CRDs are now managed by the Helm chart (was skipCrds:true with manual v1.12.10 CRDs).
        # Pre-existing Issuer/Certificate CRs are forward-compatible across cert-manager.io/v1 schemas.
        skipCrds: false
        valueFiles:
          - $values/cert-manager/values.yaml
    - repoURL: https://github.com/cgraaaj/k3s-infra.git
      targetRevision: master
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    automated:
      prune: false
      selfHeal: true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  # Per-app ignoreDifferences for CRDs is no longer needed — covered by cluster-wide argocd-cm
  # (apiextensions.k8s.io_CustomResourceDefinition rules for caBundle / inject-ca-from / status).
