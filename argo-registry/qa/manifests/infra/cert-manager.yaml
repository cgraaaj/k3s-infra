apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd-qa
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  sources:
    - repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: v1.20.2
      helm:
        # In v1.18+ the chart no longer ships CRDs in the legacy `crds/` folder; they are
        # gated behind `crds.enabled`. Setting both flags here so:
        #   - enabled=true: chart renders the 6 cert-manager CRDs (replaces our v1.12.10 set)
        #   - keep=true:    helm.sh/resource-policy=keep, so an uninstall never deletes CRDs
        #                   (which would cascade-delete every Issuer/Certificate in the cluster).
        parameters:
          - name: crds.enabled
            value: "true"
          - name: crds.keep
            value: "true"
        valueFiles:
          - $values/cert-manager/values.yaml
    - repoURL: https://github.com/cgraaaj/k3s-infra.git
      targetRevision: master
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    automated:
      prune: false
      selfHeal: true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  # Per-app ignoreDifferences for CRDs is no longer needed — covered by cluster-wide argocd-cm
  # (apiextensions.k8s.io_CustomResourceDefinition rules for caBundle / inject-ca-from / status).
