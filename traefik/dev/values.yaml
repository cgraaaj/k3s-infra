# 34.4.1 update   
ports:
  web: 
    expose:
      default: true
    # Trust X-Forwarded-* headers coming from upstream proxies on the LAN
    # (the main Docker Traefik at 10.19.94.72 chains forward-auth calls to
    # this K8s Traefik). Without this, K8s Traefik REWRITES X-Forwarded-Host
    # to its own service Host, which makes Authentik's forward_domain outpost
    # record `auth.dev.cgraaaj.in` as the post-login redirect destination
    # instead of the actual origin (e.g. homelab.cgraaaj.in). That manifests
    # as "redirected to Authentik main page after login" for every protected
    # app served via the Docker Traefik -> K8s Authentik hairpin.
    forwardedHeaders:
      trustedIPs:
        - "10.19.94.0/24"
  websecure:
    expose:
      default: true
    http3:
      enabled: true
    advertisedPort: 4443
    tls:
      enabled: true
    forwardedHeaders:
      trustedIPs:
        - "10.19.94.0/24"

ingressRoute:
  dashboard:
    enabled: false

providers:
  kubernetesCRD:
    enabled: true
    ingressClass: traefik-external
    allowExternalNameServices: true
    allowCrossNamespace: true
  kubernetesIngress:
    enabled: true
    allowExternalNameServices: true
    publishedService:
      enabled: false
#   kubernetesGateway:
#     # -- Enable Traefik Gateway provider for Gateway API
#     enabled: true
#     # -- Toggles support for the Experimental Channel resources (Gateway API release channels documentation).
#     # This option currently enables support for TCPRoute and TLSRoute.
#     experimentalChannel: true
#     # -- Array of namespaces to watch. If left empty, Traefik watches all namespaces.
#     namespaces: ["npm"]
#     # -- A label selector can be defined to filter on specific GatewayClass objects only.
#     labelselector:
#   file:
#     enabled: true
#     watch: true

# # Traefik experimental features
# experimental:
#   # -- Enable traefik experimental plugins
#   plugins: {}
#   # demo:
#   #   moduleName: github.com/traefik/plugindemo
#   #   version: v0.2.1
#   kubernetesGateway:
#     # -- Enable traefik experimental GatewayClass CRD
#     enabled: true

# volumes:
#   - name: ext-services
#     mountPath: "/config"
#     type: configMap
# Removed alongside --providers.file.directory above. Re-enable only if
# the dev cluster genuinely needs to serve a host directly (not via the
# main Traefik), and only after creating a fresh, narrowly-scoped CM.

logs:
  general:
      level: INFO  # INFO, DEBUG, ERROR
  access:
    enabled: true
    format: json

rbac:
  enabled: true

service:
  enabled: true
  type: LoadBalancer
  annotations: {}
  labels: {}
  spec:
    loadBalancerIP: 10.19.94.181 # dev cluster Traefik LB in MetalLB range (181-200)
    # Preserve real client IP on ingress (no kube-proxy SNAT). Required so that
    # forwardedHeaders.trustedIPs below can actually match the upstream Docker
    # Traefik (10.19.94.72). With the default `Cluster` policy, kube-proxy SNATs
    # to a pod-network node IP (10.42.x.0) and the trust list would have to
    # include the pod CIDR, which would let any pod in the cluster forge
    # X-Forwarded-* headers. Caveat: only nodes running a Traefik pod answer
    # the LB VIP; MetalLB L2 reconciles within a few seconds on pod moves.
    externalTrafficPolicy: Local
  loadBalancerSourceRanges: []
  externalIPs: []

