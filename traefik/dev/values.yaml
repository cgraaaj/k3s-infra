globalArguments:
  - "--global.sendanonymoususage=false"
  - "--global.checknewversion=false"

additionalArguments:
  - "--serversTransport.insecureSkipVerify=true"
  - "--log.level=DEBUG"
  # NOTE: external file provider removed (2026-04-23). The orphaned
  # ext-services ConfigMap defined routes for hosts (homelab, gallery,
  # player, vault, ...) that are actually served by the main Docker
  # Traefik on the host. Single source of truth lives there.
  # - "--providers.file.directory=/config"
  # stream line access logs and traefik logs to log files 
  # followed this https://community.traefik.io/t/how-can-i-write-access-log-as-file-in-k8s-ingress-installed-by-helm-chart/14119/5
  # - "--log.filepath=/var/log/traefik/traefik.log"
  # - "--accesslog.filepath=/var/log/traefik/traefik-access.log"
  # - "--accessLog.format=json"
  # - "--providers.kubernetesGateway.experimentalChannel=true"

deployment:
  enabled: true
  replicas: 1
  annotations: {}
  podAnnotations: {}
  additionalContainers: []
  initContainers: []
  # stream-line logs to log files
#   additionalVolumes:
#     - name: traefik-logs
#       emptyDir: {}

# additionalVolumeMounts:
